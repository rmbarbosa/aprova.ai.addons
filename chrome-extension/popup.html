<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>Aprova.ai Extension</title>
  <style>
    /* =========================================================
       Aprova.ai Extension — Popup UI
       Dark theme, chat-style, modern LLM interface
       Author: Rui Barbosa @rmblda 2026
       ========================================================= */

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --bg-input: #0d1b2a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --accent-blue: #60a5fa;
      --warning: #fbbf24;
      --error: #ef4444;
      --border: rgba(148, 163, 184, 0.1);
      --radius: 10px;
      --font: system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 400px;
      height: 520px;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: var(--bg-primary);
    }

    .header-title {
      font-size: 14px; font-weight: 700; flex: 1;
      letter-spacing: -0.01em;
    }

    .header-title span { color: var(--accent); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--error);
      transition: background 0.3s;
    }

    .status-dot.connected { background: var(--accent); }
    .status-dot.connecting {
      background: var(--warning);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.4; }
    }

    /* ---- Project selector ---- */
    .project-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .project-bar label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .project-bar select {
      flex: 1;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
    }

    .project-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ---- Action bar ---- */
    .action-bar {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .action-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .action-btn:hover:not(:disabled) {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .action-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    .action-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .action-btn .icon { font-size: 16px; }

    /* ---- Chat area ---- */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.45;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
    }

    .msg.boris {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent-dim);
      border: 1px solid rgba(74, 222, 128, 0.25);
      color: var(--accent);
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 8px;
    }

    .msg.error {
      align-self: flex-start;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }

    /* Action result card */
    .action-card {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }

    .action-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .action-card .card-title {
      font-weight: 700;
      color: var(--accent);
      font-size: 12px;
    }

    .action-card .card-stat {
      color: var(--text-muted);
      font-size: 11px;
    }

    .action-card .card-list {
      list-style: none;
      padding: 0;
    }

    .action-card .card-list li {
      padding: 3px 0;
      color: var(--text-secondary);
      font-size: 11px;
      border-bottom: 1px solid var(--border);
    }

    .action-card .card-list li:last-child {
      border-bottom: none;
    }

    .action-card .card-list li .done { color: var(--accent); }
    .action-card .card-list li .skipped { color: var(--warning); }
    .action-card .card-list li .failed { color: var(--error); }

    /* ---- Input area ---- */
    .input-area {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: var(--font);
    }

    .input-area input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-area input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #22c55e; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ---- Settings panel ---- */
    .settings-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px;
    }

    .settings-toggle:hover { color: var(--text-secondary); }

    .settings-panel {
      display: none;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .settings-panel.open { display: block; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .toggle-switch {
      position: relative;
      width: 36px; height: 20px;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--bg-tertiary);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 2px; bottom: 2px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--accent-dim);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: var(--accent);
    }

    .session-selector {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    .session-selector select {
      width: 100%;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
    }

    .disconnect-btn {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
    }

    .disconnect-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Loading spinner */
    .loading {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">A</div>
    <div class="header-title">Aprova<span>.ai</span></div>
    <button class="settings-toggle" id="settingsToggle" title="Settings">&#9881;</button>
    <div class="status-dot" id="statusDot" title="Disconnected"></div>
  </div>

  <!-- Settings Panel (collapsible) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="setting-row">
      <span>Modo Confirmar</span>
      <label class="toggle-switch">
        <input type="checkbox" id="confirmMode" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="session-selector">
      <div class="setting-row" style="margin-bottom:4px">
        <span>Sessão existente</span>
      </div>
      <select id="sessionSelect">
        <option value="">Nova sessão</option>
      </select>
    </div>
    <button class="disconnect-btn" id="disconnectBtn">Disconnect</button>
  </div>

  <!-- Project selector + connect -->
  <div class="project-bar">
    <label>Projecto</label>
    <select id="projectSelect">
      <option value="enredo-astuto-2026">enredo-astuto-2026</option>
      <option value="oasisRiver-regua-2026">oasisRiver-regua-2026</option>
      <option value="vilabelosj.2026.TemplosPingentes">vilabelosj.2026.TemplosPingentes</option>
      <option value="sifide-2025-patolai">sifide-2025-patolai</option>
    </select>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="action-btn" id="btnConnect" title="Connect session">
      <span class="icon">&#9654;</span>
      Connect
    </button>
    <button class="action-btn" id="btnScan" disabled title="Scan page fields">
      <span class="icon">&#128269;</span>
      Scan
    </button>
    <button class="action-btn" id="btnFill" disabled title="Fill page fields">
      <span class="icon">&#9997;</span>
      Fill
    </button>
    <button class="action-btn" id="btnValidate" disabled title="Validate values">
      <span class="icon">&#10003;</span>
      Validate
    </button>
  </div>

  <!-- Chat area -->
  <div class="chat" id="chat">
    <div class="msg system">Aprova.ai Extension v1.0 — ready</div>
  </div>

  <!-- Input (Ask Boris) -->
  <div class="input-area">
    <input type="text" id="askInput" placeholder="Ask Boris..." disabled>
    <button class="send-btn" id="sendBtn" disabled title="Send">&#10148;</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
