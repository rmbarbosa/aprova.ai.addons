<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>Aprova.ai Extension</title>
  <style>
    /* =========================================================
       Aprova.ai Extension — Popup UI
       Dark theme, chat-style, modern LLM interface
       Author: Rui Barbosa @rmblda 2026
       ========================================================= */

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --bg-input: #0d1b2a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --accent-blue: #60a5fa;
      --warning: #fbbf24;
      --error: #ef4444;
      --border: rgba(148, 163, 184, 0.1);
      --radius: 10px;
      --font: system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100%;
      height: 100vh;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Lobby / Connected screen toggling ---- */
    body.no-session .connected-ui { display: none !important; }
    body.no-session .lobby { display: flex !important; }
    body:not(.no-session) .lobby { display: none !important; }
    body:not(.no-session) .connected-ui { /* keep default display */ }

    /* ---- Header ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px; color: var(--bg-primary);
      flex-shrink: 0;
    }

    .header-spacer { flex: 1; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--error);
      transition: background 0.3s;
    }

    .status-dot.connected { background: var(--accent); }
    .status-dot.connecting {
      background: var(--warning);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.4; }
    }

    /* ---- Lobby Screen ---- */
    .lobby {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 32px 24px;
      gap: 20px;
    }

    .lobby-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .lobby-subpanel {
      display: none;
      width: 100%;
      max-width: 320px;
    }

    .lobby-subpanel.visible { display: block; }

    /* Session list cards */
    .session-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .session-list::-webkit-scrollbar { width: 4px; }
    .session-list::-webkit-scrollbar-track { background: transparent; }
    .session-list::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .session-card {
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .session-card .session-id {
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .session-card .session-msg {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-list-empty {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 12px;
    }

    .session-list-loading {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 12px;
    }

    .lobby-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .lobby-select {
      width: 100%;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
    }

    .lobby-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .lobby-connect-btn {
      width: 100%;
      max-width: 320px;
      padding: 10px 16px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
    }

    .lobby-connect-btn:hover:not(:disabled) { background: #22c55e; }
    .lobby-connect-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .lobby-error {
      font-size: 12px;
      color: var(--error);
      text-align: center;
      display: none;
    }

    .lobby-error.visible { display: block; }

    /* ---- Project selector (connected) ---- */
    .project-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .project-bar label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .project-bar select {
      flex: 1;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
    }

    .project-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* ---- Action bar ---- */
    .action-bar {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .action-btn {
      flex: 1;
      padding: 7px 4px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .action-btn:hover:not(:disabled) {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .action-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    .action-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .action-btn .icon {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 16px;
    }

    /* ---- Chat area ---- */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat::-webkit-scrollbar { width: 12px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 6px;
    }

    .msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.45;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
    }

    .msg.boris {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    /* ---- Markdown rendered content inside boris messages ---- */
    .msg.boris p { margin: 0 0 6px 0; }
    .msg.boris p:last-child { margin-bottom: 0; }

    .msg.boris strong { color: #fff; font-weight: 700; }
    .msg.boris em { color: var(--accent-blue); font-style: italic; }

    .msg.boris h1, .msg.boris h2, .msg.boris h3, .msg.boris h4 {
      color: var(--accent);
      margin: 8px 0 4px 0;
      line-height: 1.3;
    }
    .msg.boris h1 { font-size: 15px; }
    .msg.boris h2 { font-size: 14px; }
    .msg.boris h3 { font-size: 13px; }
    .msg.boris h4 { font-size: 12px; }

    .msg.boris code {
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
    }

    .msg.boris pre {
      position: relative;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin: 6px 0;
      overflow-x: auto;
    }
    .msg.boris pre::-webkit-scrollbar { width: 10px; height: 10px; }
    .msg.boris pre::-webkit-scrollbar-track { background: #6A6A6A; border-radius: 3px; }
    .msg.boris pre::-webkit-scrollbar-thumb { background: #AEAEAE; border-radius: 3px; }
    .msg.boris pre::-webkit-scrollbar-corner { background: #6A6A6A; }

    .msg.boris pre code {
      background: none;
      padding: 0;
      font-size: 11px;
      color: var(--text-primary);
    }

    .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(22, 22, 40, 0.85);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      opacity: 0;
    }

    .msg.boris pre:hover .copy-btn { opacity: 1; }

    .copy-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(30, 30, 50, 0.9);
    }

    .copy-btn.copied {
      color: var(--accent);
      border-color: var(--accent);
      opacity: 1;
    }

    .msg.boris ul {
      margin: 4px 0;
      padding-left: 16px;
      list-style: disc;
    }
    .msg.boris ul li {
      padding: 1px 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .msg.boris table {
      width: 100%;
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 11px;
    }
    .msg.boris th {
      background: rgba(0,0,0,0.3);
      color: var(--accent);
      font-weight: 700;
      text-align: left;
      padding: 4px 8px;
      border: 1px solid var(--border);
    }
    .msg.boris td {
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .msg.boris tr:hover td {
      background: rgba(74, 222, 128, 0.05);
    }

    .msg.boris hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 8px 0;
    }

    /* ---- Screenshot preview in chat ---- */
    .msg.user img.screenshot-preview {
      width: 120px;
      height: auto;
      max-height: 120px;
      object-fit: cover;
      border-radius: 6px;
      margin-top: 4px;
      border: 1px solid rgba(74, 222, 128, 0.2);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .msg.user img.screenshot-preview:hover {
      transform: scale(1.05);
    }

    /* Full-size overlay on click */
    .screenshot-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      cursor: pointer;
      animation: fadeIn 0.15s ease;
    }

    .screenshot-overlay img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* Form data modal */
    .formdesc-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.15s ease;
    }

    .formdesc-modal-box {
      width: 90%;
      height: 70%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .formdesc-modal-header {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .formdesc-modal-body {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 10px 14px;
      min-height: 0;
    }

    .formdesc-modal-body pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-secondary);
      font-size: 11px;
      font-family: var(--font-mono);
      line-height: 1.4;
    }

    .formdesc-modal-body::-webkit-scrollbar { width: 12px; }
    .formdesc-modal-body::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 6px; }
    .formdesc-modal-body::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 6px; }

    .formdesc-modal-footer {
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .formdesc-modal-footer button {
      padding: 5px 20px;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
    }

    .formdesc-modal-footer button:hover { background: #22c55e; }

    /* ---- Step / thinking messages ---- */
    .msg.step {
      align-self: flex-start;
      background: transparent;
      color: var(--text-muted);
      font-size: 9px;
      padding: 0 8px;
      margin: -3px 0 -3px 18px;
      line-height: 1.2;
      font-family: var(--font-mono);
      animation: fadeIn 0.15s ease;
    }

    .msg.step::before {
      content: "› ";
      color: var(--accent-dim);
    }

    /* ---- Processing indicator ---- */
    .processing {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--text-muted);
      animation: fadeIn 0.2s ease;
    }

    .processing-dots {
      display: flex;
      gap: 3px;
    }

    .processing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .processing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .processing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent-dim);
      border: 1px solid rgba(74, 222, 128, 0.25);
      color: var(--accent);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      color: var(--text-muted);
      font-size: 11px;
      padding: 4px 8px;
    }

    .msg.error {
      align-self: flex-start;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--error);
    }

    /* Action result card */
    .action-card {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      width: 100%;
      animation: fadeIn 0.2s ease;
    }

    .action-card .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .action-card .card-title {
      font-weight: 700;
      color: var(--accent);
      font-size: 12px;
    }

    .action-card .card-stat {
      color: var(--text-muted);
      font-size: 11px;
    }

    .action-card .card-list {
      list-style: none;
      padding: 0;
    }

    .action-card .card-list li {
      padding: 3px 0;
      color: var(--text-secondary);
      font-size: 11px;
      border-bottom: 1px solid var(--border);
    }

    .action-card .card-list li:last-child {
      border-bottom: none;
    }

    .action-card .card-list li .done { color: var(--accent); }
    .action-card .card-list li .skipped { color: var(--warning); }
    .action-card .card-list li .failed { color: var(--error); }

    /* ---- Input area ---- */
    .input-area {
      display: flex;
      flex-direction: column;
      padding: 0 16px 10px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    /* Attachment preview */
    .attach-preview {
      display: none;
      padding: 8px 0 4px 0;
    }

    .attach-preview.visible { display: flex; gap: 8px; align-items: flex-start; }

    .attach-preview-inner {
      position: relative;
      display: inline-block;
    }

    .attach-preview-inner.hidden { display: none; }

    .attach-preview-inner img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .attach-preview-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .attach-preview-remove:hover {
      background: var(--error);
      border-color: var(--error);
      color: #fff;
    }

    /* Doc-style attachment thumbnail */
    .attach-preview-doc {
      width: 56px;
      height: 72px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 4px;
      color: var(--accent-blue);
    }

    .attach-preview-doc .doc-label {
      font-size: 7px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.2;
    }

    /* Doc thumbnail in user chat bubble */
    .msg.user .form-desc-thumb {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 80px;
      height: 56px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-radius: 6px;
      margin-bottom: 4px;
      vertical-align: top;
      color: var(--accent-blue);
      font-size: 8px;
    }

    .input-box {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 4px 4px 4px;
      transition: border-color 0.15s;
    }

    .input-box:focus-within {
      border-color: var(--accent);
    }

    .input-box textarea {
      flex: 1;
      background: transparent;
      color: var(--text-primary);
      border: none;
      padding: 4px 8px;
      font-size: 13px;
      font-family: var(--font);
      resize: none;
      min-height: 28px;
      max-height: 110px;
      overflow-y: auto;
      line-height: 1.4;
      outline: none;
    }

    .input-box textarea::placeholder {
      color: var(--text-muted);
    }

    .input-box textarea::-webkit-scrollbar { width: 3px; }
    .input-box textarea::-webkit-scrollbar-track { background: transparent; }
    .input-box textarea::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    .send-btn {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .attach-wrapper {
      position: relative;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .attach-btn {
      background: none;
      color: var(--text-muted);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .attach-btn:hover {
      color: var(--text-primary);
    }

    .attach-btn.open {
      color: var(--accent);
      transform: rotate(45deg);
    }

    .attach-menu {
      display: none;
      position: absolute;
      bottom: 36px;
      left: -4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      min-width: 200px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      animation: fadeIn 0.15s ease;
    }

    .attach-menu.open { display: block; }

    .attach-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.1s;
    }

    .attach-menu-item:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .send-btn:hover { background: #22c55e; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .send-btn.stop-mode {
      background: var(--error);
      font-size: 12px;
    }
    .send-btn.stop-mode:hover { background: #dc2626; }

    /* ---- Settings panel ---- */
    .settings-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
    }

    .settings-toggle:hover { color: var(--text-secondary); }

    .settings-panel {
      display: none;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .settings-panel.open { display: block; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .toggle-switch {
      position: relative;
      width: 36px; height: 20px;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--bg-tertiary);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px; height: 16px;
      left: 2px; bottom: 2px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--accent-dim);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: var(--accent);
    }

    .disconnect-btn {
      margin-top: 8px;
      width: 100%;
      padding: 6px;
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
    }

    .disconnect-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* Loading spinner */
    .loading {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="no-session">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">A</div>
    <span class="session-info connected-ui" id="sessionInfo" style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;" title=""></span>
    <div class="header-spacer"></div>
    <button class="settings-toggle connected-ui" id="settingsToggle" title="Settings"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="9" cy="6" r="2" fill="currentColor"/><circle cx="15" cy="12" r="2" fill="currentColor"/><circle cx="9" cy="18" r="2" fill="currentColor"/></svg></button>
    <div class="status-dot" id="statusDot" title="Disconnected"></div>
  </div>

  <!-- Bridge offline banner -->
  <div id="offlineBanner" style="display:none;background:rgba(239,68,68,0.15);color:var(--error);text-align:center;padding:4px 8px;font-size:11px;border-bottom:1px solid rgba(239,68,68,0.3);flex-shrink:0;">Bridge offline</div>

  <!-- =============== LOBBY (Screen 1) =============== -->
  <div class="lobby" id="lobby">
    <div class="lobby-title">Aprova.ai Extension</div>

    <!-- Live Claude sessions (informational) -->
    <div class="lobby-subpanel visible" id="panelExisting">
      <div class="lobby-section-label">Sessões Claude Code activas</div>
      <div class="session-list" id="sessionList">
        <div class="session-list-loading"><span class="loading"></span>A carregar...</div>
      </div>
    </div>

    <!-- Project picker -->
    <div class="lobby-subpanel visible">
      <div class="lobby-section-label">Projecto</div>
      <select id="lobbyProjectSelect" class="lobby-select"></select>
    </div>

    <div class="lobby-error" id="lobbyError"></div>

    <button class="lobby-connect-btn" id="lobbyConnectBtn">Iniciar Sessão</button>
  </div>

  <!-- =============== CONNECTED UI (Screen 2) =============== -->

  <!-- Settings Panel (collapsible) -->
  <div class="settings-panel connected-ui" id="settingsPanel">
    <div class="setting-row">
      <span>Modo Confirmar</span>
      <label class="toggle-switch">
        <input type="checkbox" id="confirmMode" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <span>Timeout (s)</span>
      <select id="timeoutSelect" style="background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;font-family:var(--font);">
        <option value="0">No timeout</option>
        <option value="60">60</option>
        <option value="120" selected>120</option>
        <option value="240">240</option>
        <option value="480">480</option>
        <option value="600">600</option>
      </select>
    </div>
    <div class="setting-row">
      <span>Bridge URL</span>
      <input id="bridgeUrlInput" type="text" placeholder="http://localhost:9090" style="background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:11px;font-family:var(--font-mono);width:160px;">
    </div>
    <button class="disconnect-btn" id="clearChatBtn" style="background:rgba(96,165,250,0.1);color:var(--accent-blue);border-color:rgba(96,165,250,0.3)">Limpar Conversa</button>
    <button class="disconnect-btn" id="disconnectBtn">Desligar Sessão</button>
  </div>

  <!-- Project selector (scope for chat/fill/validate) -->
  <div class="project-bar connected-ui">
    <label>Projecto</label>
    <select id="projectSelect"></select>
  </div>


  <!-- Chat area -->
  <div class="chat connected-ui" id="chat">
    <div class="msg system">Aprova.ai Extension v1.0 — ready</div>
  </div>

  <!-- Input (Ask Boris) -->
  <div class="input-area connected-ui">
    <!-- Pending attachment preview -->
    <div class="attach-preview" id="attachPreview">
      <div class="attach-preview-inner hidden">
        <img id="attachPreviewImg" src="" alt="screenshot">
        <button class="attach-preview-remove" id="attachPreviewRemove"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <div class="input-row">
      <div class="input-box">
        <div class="attach-wrapper">
          <button class="attach-btn" id="attachBtn" title="Anexar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
          <div class="attach-menu" id="attachMenu">
            <button class="attach-menu-item" id="screenshotBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M3 9h2M19 9h2M9 3v2M9 19v2M15 3v2M15 19v2"/></svg>Screenshot da página</button>

            <button class="attach-menu-item" id="describeFormBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>Scan Form</button>
            <button class="attach-menu-item" id="validateFormBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>Validate Content</button>
          </div>
        </div>
        <textarea id="askInput" placeholder="Ask Boris..." rows="1"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="Send"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
